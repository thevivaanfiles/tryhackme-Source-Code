# Nginx reverse proxy for the Coding Club CTF (Docker app on 127.0.0.1:3000).
# Place at: /etc/nginx/sites-available/tryhackme.codingclubrvce.com.conf
# Enable:   ln -s ../sites-available/<file> /etc/nginx/sites-enabled/  &&  nginx -t && systemctl reload nginx

# --- HTTP: allow ACME challenges, redirect everything else to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name tryhackme.codingclubrvce.com;

    # Let's Encrypt HTTP-01 challenge (works once DNS points here).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: proxy to the Next.js container ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tryhackme.codingclubrvce.com;

    # Self-signed for now; `certbot --nginx` will replace these two lines with
    # the Let's Encrypt paths once DNS resolves to this server.
    ssl_certificate     /etc/ssl/tryhackme/fullchain.pem;
    ssl_certificate_key /etc/ssl/tryhackme/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Challenge files can be up to 50 MB — give headroom (nginx default is 1 MB).
    client_max_body_size 60m;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        # WebSocket/upgrade support (harmless if unused).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
